site_name: Evan's Notes
site_description: Technical notes and research log
site_url: https://evan0571.github.io/notes/

theme:
  name: material
  language: zh
  font: false
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - scheme: default
      primary: brown
      accent: brown
    - scheme: slate
      primary: brown
      accent: brown

plugins:
  - search:
      lang:
        - en
        - zh

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Computer Science:
    - CS400:
      - BST: computer-science/cs400/bst.md
      - RBT: computer-science/cs400/rbt.md
      - AVL Tree: computer-science/cs400/avl-tree.md
      - B Tree: computer-science/cs400/b-tree.md
      - Bash: computer-science/cs400/bash.md
      - JUnit: computer-science/cs400/junit.md
      - Version Control: computer-science/cs400/version-control.md
      - Make: computer-science/cs400/make.md
  - Mathematics:
    - MATH221:
      - Chapter 1: mathematics/MATH221/chapter-1.md
      - Chapter 2: mathematics/MATH221/chapter-2.md
      - Chapter 3: mathematics/MATH221/chapter-3.md
