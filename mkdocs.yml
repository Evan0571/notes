site_name: Evan's Notes
site_description: Technical notes and research log
site_url: https://evan0571.github.io/notes/
repo_url: https://github.com/Evan0571/notes
repo_name: Evan0571/notes

theme:
  name: material
  language: zh
  font: false
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang:
        - en
        - zh

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/view-counter.js
  - javascripts/giscus.js

nav:
  - Home: index.md
  - Computer Science:
    - CS400:
      - computer-science/cs400/index.md
      - BST: computer-science/cs400/bst.md
      - RBT: computer-science/cs400/rbt.md
      - AVL Tree: computer-science/cs400/avl-tree.md
      - B Tree: computer-science/cs400/b-tree.md
      - Bash: computer-science/cs400/bash.md
      - JUnit: computer-science/cs400/junit.md
      - Version Control: computer-science/cs400/version-control.md
      - Make: computer-science/cs400/make.md
      - Lambda Expressions: computer-science/cs400/lambda-expressions.md
      - Minimum Spanning Tree: computer-science/cs400/minimum-spanning-tree.md
  - Mathematics:
    - MATH221:
      - mathematics/MATH221/index.md
      - Chapter 1: mathematics/MATH221/chapter-1.md
      - Chapter 2: mathematics/MATH221/chapter-2.md
      - Chapter 3: mathematics/MATH221/chapter-3.md
  - Links: links.md
