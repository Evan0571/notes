site_name: My Notes
site_description: Personal notes powered by MkDocs Material
site_url: https://evan0571.github.io/notes/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight
    - content.code.annotate
  palette:
    - scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Guide:
      - Getting Started: guide/getting-started.md
