site_name: My Notes
site_description: Personal notes powered by MkDocs Material
site_url: https://evan0571.github.io/notes/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 入门:
      - 环境准备: guide/getting-started.md
