site_name: My Notes
site_description: Personal notes powered by MkDocs Material
site_url: https://evan0571.github.io/notes/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight
  palette:
    - scheme: default
      primary: brown
      accent: brown
    - scheme: slate
      primary: brown
      accent: brown

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Guide:
      - Getting Started: guide/getting-started.md
