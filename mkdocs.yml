site_name: Evan's Notes
site_description: Technical notes and research log
site_url: https://evan0571.github.io/notes/

theme:
  name: material
  language: zh
  font: false
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - scheme: default
      primary: brown
      accent: brown
    - scheme: slate
      primary: brown
      accent: brown

plugins:
  - search:
      lang:
        - en
        - zh

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Computer Science:
      - Overview: computer-science/index.md
      - Algorithms: computer-science/algorithms.md
      - Data Structures: computer-science/data-structures.md
  - System:
      - Overview: system/index.md
      - Linux Basics: system/linux-basics.md
      - Networking: system/networking.md
  - AI:
      - Overview: ai/index.md
      - Fundamentals: ai/fundamentals.md
      - Tooling: ai/tooling.md
  - EDA:
      - Overview: eda/index.md
      - Exploratory Workflow: eda/exploratory-workflow.md
  - Mathematics:
      - Overview: mathematics/index.md
      - Linear Algebra: mathematics/linear-algebra.md
  - Papers:
      - Overview: papers/index.md
      - Reading Notes: papers/reading-notes.md
  - Miscellaneous:
      - Overview: miscellaneous/index.md
      - Getting Started: guide/getting-started.md
